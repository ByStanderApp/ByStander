<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Required for Google Sign-In on web: replace content with your Web client ID from Firebase/Google Cloud -->
  <!-- Firebase Console → Project settings → Your apps → Web app, or Google Cloud Console → Credentials → OAuth 2.0 Client ID (Web) -->
  <meta name="google-signin-client_id" content="870355236952-bu0r1q77mhg0alcef0jh0atrfch0kfgj.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="bystander_frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>bystander_frontend</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Try online assets first. If unreachable, app will use fallback libraries.
    window.__bystanderOnlineMaps = false;
    window.__bystanderOnlineFonts = false;
    window.__bystanderOnlineAssetsReady = false;

    function loadGoogleMapsScript() {
      return new Promise((resolve) => {
        const s = document.createElement('script');
        s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyD1kYVBoELUxliE6_tToQU4D008WqfclI8';
        s.async = true;
        s.defer = true;
        s.onload = () => resolve(true);
        s.onerror = () => resolve(false);
        document.head.appendChild(s);
      });
    }

    function loadGoogleFontsStylesheet() {
      return new Promise((resolve) => {
        const l = document.createElement('link');
        l.rel = 'stylesheet';
        l.href = 'https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap';
        l.onload = () => resolve(true);
        l.onerror = () => resolve(false);
        document.head.appendChild(l);
      });
    }

    Promise.all([loadGoogleMapsScript(), loadGoogleFontsStylesheet()])
      .then((results) => {
        window.__bystanderOnlineMaps = Boolean(results[0]);
        window.__bystanderOnlineFonts = Boolean(results[1]);
      })
      .catch(() => {
        window.__bystanderOnlineMaps = false;
        window.__bystanderOnlineFonts = false;
      })
      .finally(() => {
        window.__bystanderOnlineAssetsReady = true;
        window.dispatchEvent(new Event('bystander-assets-ready'));
      });
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
